services:
  db:
    image: postgres:16-alpine
    container_name: ai_radar_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ai_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d ai_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_radar_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backend:/app
      # Service Account key for Vertex AI auth
      - ./secrets/sa-key.json:/secrets/sa-key.json:ro
    environment:
      # Override DATABASE_URL so containers always resolve "db" hostname
      DATABASE_URL: postgresql+asyncpg://radar:radar_dev@db:5432/ai_radar
      # Vertex AI auth via Service Account JSON
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
      # Admin API key — override in production
      ADMIN_API_KEY: changeme
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: ai_radar_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  pgdata:
